name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Add access-code hash
        env:
          ACCESS_CODE: ${{ secrets.SECRET }}
        run: |
          if [ -z "$ACCESS_CODE" ]; then
            echo "Repository secret named SECRET is missing." >&2
            exit 1
          fi
          
          # Generate the SHA-256 hash cleanly using native Unix utilities
          HASH=$(echo -n "$ACCESS_CODE" | tr -d '\r\n' | openssl dgst -sha256 | awk '{print $2}')
          echo "Hash generated successfully."
          
          # Replace the placeholder in index.html seamlessly using sed
          sed -i "/const ACCESS_CODE_HASH/s/__ACCESS_CODE_HASH__/$HASH/" index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
