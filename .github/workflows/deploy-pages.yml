name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Inject access code
        env:
          ACCESS_CODE: ${{ secrets.SECRET }}
        run: |
          if [ -z "$ACCESS_CODE" ]; then
            echo "Repository secret named SECRET is missing." >&2
            exit 1
          fi

          # Strip any stray carriage returns/newlines from the secret value
          CODE=$(printf '%s' "$ACCESS_CODE" | tr -d '\r\n')

          # Replace the placeholder on the ACCESS_CODE assignment line only.
          # Use a non-/ sed delimiter so codes containing "/" still work,
          # and export CODE so the python helper can read it safely.
          export CODE
          python3 - <<'PY'
          import os
          code = os.environ["CODE"]
          replacement = 'const ACCESS_CODE = ' + ('"' + code.replace('\\', '\\\\').replace('"', '\\"') + '"')
          for filename in ("gold-estimate.html", "silver-estimate.html"):
              with open(filename, "r", encoding="utf-8") as f:
                  html = f.read()
              placeholder = 'const ACCESS_CODE = "__ACCESS_CODE__"'
              if placeholder not in html:
                  raise SystemExit(f"Access code placeholder missing from {filename}.")
              html = html.replace(placeholder, replacement, 1)
              with open(filename, "w", encoding="utf-8") as f:
                  f.write(html)
              print(f"Access code injected into {filename}.")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
